worker_logs:
  - data/raw/runs_qwen2.5_1.5b_full_bbh_20260618T040824Z.jsonl
  - data/raw/runs_qwen2.5_7b_full_bbh_20260618T040824Z.jsonl
modes_file: data/derived/bbh_modes_raw.json
allow_partial_modes: true
mode_order:
  - boolean_expressions
  - causal_judgement
  - date_understanding
  - disambiguation_qa
  - dyck_languages
  - formal_fallacies
  - geometric_shapes
  - hyperbaton
  - multistep_arithmetic_two
  - navigate
  - object_counting
  - word_sorting
success_threshold: strict
budget_attempts: 10
execution_order: ["1.5b", "7b"]
kfold:
  n_folds: 5
  stratify_by: mode
  seed: 0
router:
  backend: codex_cli
  model_env: ROUTER_MODEL
  reasoning_effort: medium
  temperature: 0
  in_context: full_traces
  parse_fail_default: {"n_1.5b": 0, "n_7b": 10}
estimation:
  bootstrap_B: 1000
frontier:
  clock: seconds
  censoring_floor: 1.0e-3
  bootstrap_B: 1000
paths:
  folds: data/derived/bbh_folds_raw.json
  results: data/derived/bbh_router_results_raw.jsonl
  summary: data/derived/bbh_router_summary_raw.json
  figures: figures/router_bbh_raw
  category_frontier: data/derived/bbh_subtask_frontier.json
  category_frontier_figures: figures/router_bbh_raw
