backend: ollama
models:
  - qwen2.5:1.5b
  - qwen2.5:7b
  - qwen2.5:32b
dataset: bbh
max_examples_per_subtask: 100
selected_subtasks:
  - boolean_expressions
  - causal_judgement
  - date_understanding
  - disambiguation_qa
  - dyck_languages
  - formal_fallacies
  - geometric_shapes
  - hyperbaton
  - multistep_arithmetic_two
  - navigate
  - object_counting
  - word_sorting
sampling:
  temperature: 0.6
  top_p: 0.95
  max_new_tokens: 2048
  max_attempts: 10
  seed: 0
execution:
  timeout_seconds: 1
estimation:
  censoring_floor: 1.0e-3
  bootstrap_B: 1000
paths:
  raw: data/raw
  derived: data/derived
  figures: figures_bbh
  modes: bbh_modes.json
  modes_raw: bbh_modes_raw.json
  mode_groups: bbh_mode_groups.json
  modes_meta: bbh_modes_meta.json
