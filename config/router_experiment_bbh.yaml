worker_logs:
  - data/raw/runs_qwen2.5_1.5b_full_bbh_20260618T040824Z.jsonl
  - data/raw/runs_qwen2.5_7b_full_bbh_20260618T040824Z.jsonl
modes_file: data/derived/bbh_modes.json
allow_partial_modes: true
mode_order: ["arithmetic", "logical_deduction", "language", "spatial_temporal", "algorithmic"]
success_threshold: strict
budget_attempts: 10
execution_order: ["1.5b", "7b"]
kfold:
  n_folds: 5
  stratify_by: mode
  seed: 0
router:
  backend: codex_cli
  model_env: ROUTER_MODEL
  reasoning_effort: medium
  temperature: 0
  in_context: full_traces
  parse_fail_default: {"n_1.5b": 0, "n_7b": 10}
estimation:
  bootstrap_B: 1000
frontier:
  clock: seconds
  censoring_floor: 1.0e-3
  bootstrap_B: 1000
paths:
  folds: data/derived/bbh_folds.json
  results: data/derived/bbh_router_results.jsonl
  summary: data/derived/bbh_router_summary.json
  figures: figures/router_bbh
  category_frontier: data/derived/bbh_family_frontier.json
  category_frontier_figures: figures/router_bbh
